<body>
<div id="badge" class="badge"></div>
<div class="mt" id="app"></div>
<script>
// ===================== META =====================
var MONTHS_META=[["Jul","'26"],["Aug","'26"],["Sep","'26"],["Oct","'26"],["Nov","'26"],["Dec","'26"],
["Jan","'27"],["Feb","'27"],["Mar","'27"],["Apr","'27"],
["May","'27"],["Jun","'27"],["Jul","'27"],["Aug","'27"],["Sep","'27"],["Oct","'27"],["Nov","'27"],["Dec","'27"],
["Jan","'28"],["Feb","'28"],["Mar","'28"],["Apr","'28"]];
var TABS=[{name:"🟠 JUL–DEC 2026",s:0,e:5},{name:"🟣 JAN–APR '27",s:6,e:9},{name:"🟢 POST-MOVE '27–'28",s:10,e:21}];
function tabOf(i){return i<6?0:(i<10?1:2);}
var DATA_VERSION="2026-07-02-b";
var STORE="niw_tracker_autosave_v1";

// ===================== DEFAULTS =====================
function m26(inc,bills){return {income:inc,bills:bills};}
function seed27(extraInc){
  var inc=[{n:"Paycheck 1",a:1740},{n:"Paycheck 2",a:1740},{n:"Side income",a:290}].concat(extraInc||[]);
  var bills=[{n:"Insurance",a:273},{n:"Car",a:605},{n:"Phone",a:134},{n:"Student loans",a:50},{n:"Subs+Apple",a:62},{n:"Hair",a:110},{n:"Child support",a:450}];
  return {income:inc,bills:bills};
}
function seedPM(){
  var inc=[{n:"Paycheck 1",a:2075},{n:"Paycheck 2",a:2075},{n:"Side income",a:290}];
  var bills=[{n:"Insurance",a:273},{n:"Car",a:605},{n:"Phone",a:134},{n:"Student loans",a:50},{n:"Subs+Apple",a:62},{n:"Hair",a:110},{n:"Child support",a:450},{n:"Rent",a:1000}];
  return {income:inc,bills:bills};
}
function buildDefaultMonths(){
  var m=[];
  m.push(m26([{n:"Paycheck 1",a:1397},{n:"Paycheck 2",a:1397},{n:"Side income",a:220},{n:"Extra hustle",a:405},{n:"Plasma remainder",a:175},{n:"Gift / other",a:450},{n:"school",a:105}],
    [{n:"Phone (intl+late)",a:258},{n:"Insurance",a:273},{n:"Car",a:605},{n:"Misc",a:60},{n:"Subs+Apple",a:62},{n:"Credit card min",a:75},{n:"Klarna",a:77},{n:"Affirm",a:177},{n:"CC payoff",a:310},{n:"cashapp",a:60}]));
  m.push(m26([{n:"Paycheck 1",a:1397},{n:"Paycheck 2",a:1397},{n:"Side income",a:490}],
    [{n:"Phone",a:134},{n:"Insurance",a:273},{n:"Car",a:605},{n:"Hair",a:110},{n:"Subs+Apple",a:62},{n:"Credit card min",a:25},{n:"Kikoff (last)",a:70},{n:"Klarna",a:22},{n:"Affirm",a:177},{n:"CC payoff",a:300}]));
  m.push(m26([{n:"Paycheck 1",a:1397},{n:"Paycheck 2",a:1397},{n:"Side income",a:490}],
    [{n:"Phone",a:134},{n:"Insurance",a:273},{n:"Car",a:605},{n:"Hair",a:110},{n:"Subs+Apple",a:62},{n:"CC payoff (final)",a:500},{n:"Klarna",a:20},{n:"Affirm",a:177}]));
  m.push(m26([{n:"Paycheck 1",a:1397},{n:"Paycheck 2",a:1397},{n:"Paycheck 3 (13th)",a:1397},{n:"Side income",a:490}],
    [{n:"Phone",a:134},{n:"Insurance",a:273},{n:"Car",a:605},{n:"Hair",a:110},{n:"Subs+Apple",a:62},{n:"Affirm",a:132}]));
  m.push(m26([{n:"Paycheck 1",a:1397},{n:"Paycheck 2",a:1397},{n:"Side income",a:490}],
    [{n:"Phone",a:134},{n:"Insurance",a:273},{n:"Car",a:605},{n:"Hair",a:110},{n:"Subs+Apple",a:62},{n:"Affirm",a:132}]));
  m.push(m26([{n:"Paycheck 1",a:1397},{n:"Paycheck 2",a:1397},{n:"Side income",a:490}],
    [{n:"Phone",a:134},{n:"Insurance",a:273},{n:"Car",a:605},{n:"Hair",a:110},{n:"Subs+Apple",a:62},{n:"Affirm",a:132}]));
  m.push(seed27());                              // Jan '27
  m.push(seed27([{n:"Tax return",a:1000}]));     // Feb '27
  m.push(seed27());                              // Mar '27
  m.push(seed27([{n:"Paycheck 3 (13th)",a:1740}])); // Apr '27
  for(var i=0;i<12;i++)m.push(seedPM());         // May '27 - Apr '28
  return m;
}
function zeros(n){var a=[];for(var i=0;i<n;i++)a.push(0);return a;}
function nulls(n){var a=[];for(var i=0;i<n;i++)a.push(null);return a;}
function falses(n){var a=[];for(var i=0;i<n;i++)a.push(false);return a;}
var DEFAULTS={
  junEnd:1726,
  months:buildDefaultMonths(),
  gas:240,fun:200,
  plasma2:false,jewelry:false,
  discretionary:(function(){var d=zeros(22);d[0]=53;return d;})(),
  monthOverrides:nulls(22),
  closedMonths:falses(22),
  hiddenTabs:[false,false,false],
  currentMonthIdx:0,openMonth:null,phase:0,efTarget:3000
};

// ===================== STATE + PERSISTENCE =====================
var S=JSON.parse(JSON.stringify(DEFAULTS));
var storageOK=true;
function migrate(sv){
  var S2=JSON.parse(JSON.stringify(DEFAULTS));
  if(sv.months&&sv.months.length===22){S2.months=sv.months;}
  else if(sv.jdMonths){for(var i=0;i<6&&i<sv.jdMonths.length;i++){if(sv.jdMonths[i]&&sv.jdMonths[i].income)S2.months[i]=sv.jdMonths[i];}}
  if(sv.junEnd!=null)S2.junEnd=Number(sv.junEnd);
  if(sv.gas!=null)S2.gas=Number(sv.gas); else if(sv.gas26!=null)S2.gas=Number(sv.gas26);
  if(sv.fun!=null)S2.fun=Number(sv.fun); else if(sv.fun26!=null)S2.fun=Number(sv.fun26);
  if(sv.discretionary){for(var i=0;i<sv.discretionary.length&&i<22;i++)S2.discretionary[i]=Number(sv.discretionary[i])||0;}
  if(sv.monthOverrides){for(var i=0;i<sv.monthOverrides.length&&i<22;i++)S2.monthOverrides[i]=sv.monthOverrides[i];}
  if(sv.closedMonths){for(var i=0;i<sv.closedMonths.length&&i<22;i++)S2.closedMonths[i]=!!sv.closedMonths[i];}
  if(sv.hiddenTabs)S2.hiddenTabs=sv.hiddenTabs.slice(0,3);
  if(typeof sv.currentMonthIdx==="number")S2.currentMonthIdx=Math.min(sv.currentMonthIdx,21);
  if(typeof sv.plasma2==="boolean")S2.plasma2=sv.plasma2;
  if(typeof sv.jewelry==="boolean")S2.jewelry=sv.jewelry;
  if(typeof sv.efTarget==="number")S2.efTarget=sv.efTarget;
  if(typeof sv.phase==="number")S2.phase=Math.min(sv.phase,2);
  if(typeof sv.openMonth==="number")S2.openMonth=Math.min(sv.openMonth,21);
  return S2;
}
try{
  var raw=localStorage.getItem(STORE);
  if(raw){var sv=JSON.parse(raw);
    if(sv.__v===DATA_VERSION&&sv.months){S=Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),sv);}
    else{S=migrate(sv);}
  }
}catch(e){storageOK=false;}
function save(){try{S.__v=DATA_VERSION;localStorage.setItem(STORE,JSON.stringify(S));storageOK=true;}catch(e){storageOK=false;}flashBadge();}
function flashBadge(){var b=document.getElementById("badge");if(!b)return;
  if(storageOK){b.textContent="✓ saved";b.style.background="#4FE08022";b.style.color="#4FE080";b.style.border="1px solid #4FE08055";}
  else{b.textContent="⚠ storage off — use backup code";b.style.background="#FF505022";b.style.color="#FF8080";b.style.border="1px solid #FF505055";}}

// ===================== HELPERS =====================
function fmt(n){if(n==null||isNaN(n))return"$0";var s=Math.abs(Math.round(n)).toLocaleString("en-US");return(n<0?"-$":"$")+s;}
function sumLines(a){return a.reduce(function(t,x){return t+Number(x.a);},0);}
function sumDone(a){return a.reduce(function(t,x){return t+(x.done?Number(x.a):0);},0);}
function sumNotDone(a){return a.reduce(function(t,x){return t+(x.done?0:Number(x.a));},0);}
function dLab(i){var d=new Date(2026,6+i,1);return d.toLocaleString("en-US",{month:"short",year:"numeric"});}

// ===================== STATE MUTATORS =====================
function set(k,v){S[k]=v;save();render();}
function editLine(mi,type,li,v){S.months[mi][type][li].a=Number(v)||0;save();render();}
function editLineName(mi,type,li,name){S.months[mi][type][li].n=name;save();render();}
function addLine(mi,type){S.months[mi][type].push({n:"New item",a:0});save();render();}
function delLine(mi,type,li){S.months[mi][type].splice(li,1);save();render();}
function toggleDone(mi,type,li){S.months[mi][type][li].done=!S.months[mi][type][li].done;save();render();}
function toggleMonth(i){S.openMonth=S.openMonth===i?null:i;save();render();}
function setOverride(i,v){S.monthOverrides[i]=(v===""||v==null)?null:Number(v);save();render();}
function addDisc(i,amt){S.discretionary[i]=Math.round(((Number(S.discretionary[i])||0)+amt)*100)/100;save();render();}
function addMoney(i,amt){S.discretionary[i]=Math.round(((Number(S.discretionary[i])||0)-amt)*100)/100;save();render();}
function setDisc(i,v){S.discretionary[i]=(v===""||v==null)?0:Number(v);save();render();}
function setCurrentMonth(i){S.currentMonthIdx=i;S.openMonth=i;S.phase=tabOf(i);save();render();}
var pendingClose=false;
function askClose(){pendingClose=true;render();}
function cancelClose(){pendingClose=false;render();}
function closeMonth(i){
  var C=calc();var finalBal=C.liveBalance;
  S.monthOverrides[i]=finalBal;S.closedMonths[i]=true;
  if(i<21){S.currentMonthIdx=i+1;S.openMonth=i+1;S.phase=tabOf(i+1);}
  pendingClose=false;save();render();
}
function reopenMonth(i){S.monthOverrides[i]=null;S.closedMonths[i]=false;S.currentMonthIdx=i;S.openMonth=i;S.phase=tabOf(i);save();render();}
var pendingHide=null;
function askHide(t){pendingHide=t;render();}
function cancelHide(){pendingHide=null;render();}
function hideTab(t){S.hiddenTabs[t]=true;if(S.phase===t)S.phase=Math.min(t+1,2);pendingHide=null;save();render();}
var pendingReset=false;
function askReset(){pendingReset=true;render();}
function doReset(){S=JSON.parse(JSON.stringify(DEFAULTS));pendingReset=false;save();render();}
function cancelReset(){pendingReset=false;render();}
// backup code
function makeCode(){return btoa(unescape(encodeURIComponent(JSON.stringify(S))));}
function copyCode(){var c=makeCode();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(c).then(function(){alert("Backup code copied! Paste it in your Notes app.");}).catch(function(){window.prompt("Copy this backup code:",c);});}else{window.prompt("Copy this backup code:",c);}}
function loadCode(){var c=window.prompt("Paste your backup code:");if(!c)return;try{var o=JSON.parse(decodeURIComponent(escape(atob(c.trim()))));S=(o.__v===DATA_VERSION&&o.months)?Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),o):migrate(o);save();render();alert("Loaded!");}catch(e){alert("That code didn't work.");}}

// ===================== CALC — one continuous 22-month chain =====================
function calc(){
  var plasmaIn=zeros(22);
  plasmaIn[3]+=S.plasma2?450:0;
  plasmaIn[5]+=S.jewelry?500:0;
  var total=Number(S.junEnd),cm=S.currentMonthIdx,liveBalance=null;
  var months=S.months.map(function(M,i){
    var inc=sumLines(M.income),billSum=sumLines(M.bills);
    var extra=plasmaIn[i],disc=Number(S.discretionary[i])||0;
    var net=inc-billSum-Number(S.gas)-Number(S.fun)+extra-disc;
    var startBal=total;
    total=Math.round(total+net);
    if(S.monthOverrides[i]!=null)total=Number(S.monthOverrides[i]);
    if(i===cm){liveBalance=Math.round(startBal+sumDone(M.income)-sumDone(M.bills)-disc);}
    var floor=i===0?Math.min(2000,S.efTarget):S.efTarget;
    var ef=Math.min(total,floor);var cash=total-ef;
    return {i:i,inc:inc,billSum:billSum,net:net,extra:extra,disc:disc,total:total,ef:ef,cash:cash,startBal:startBal};
  });
  var projEnd=months[cm].total;
  // $50K date
  var k50="—";
  var hit=-1;
  for(var i=0;i<22;i++){if(months[i].total>=50000){hit=i;break;}}
  if(hit>=0){k50=dLab(hit);}
  else{
    var bal=months[21].total,n=months[21].net,m=21,guard=0;
    if(n>0){while(bal<50000&&guard<120){bal+=n;m++;guard++;}k50=guard<120?dLab(m):"—";}
  }
  return {months:months,liveBalance:liveBalance,projEnd:projEnd,k50:k50,dec26:months[5].total,apr27:months[9].total};
}

// ===================== RENDER =====================
function render(){
  flashBadge();
  var C=calc();
  var app=document.getElementById("app");
  var cm=S.currentMonthIdx;
  var cmMeta=MONTHS_META[cm];
  var cmLabel=cmMeta[0].toUpperCase()+" "+cmMeta[1];
  var h='';
  h+='<div class="logo">ROADMAP<span>→$50K</span></div>';
  h+='<div class="sub">Nathan Woodard · Financial Plan · Auto-Save</div>';
  h+='<div class="subnote">every number saves automatically · all months editable</div>';
  h+='<div class="br" style="margin-top:8px"><button class="btn" onclick="copyCode()">⬆ backup code</button><button class="btn" onclick="loadCode()">↻ load code</button></div>';
  h+='<div class="div"></div>';
  // Milestones
  h+='<div class="g3">';
  h+='<div class="card" style="border-color:#FFE02044"><div class="cl">Dec 2026</div><div class="cv y" style="font-size:1.3rem">'+fmt(C.dec26)+'</div></div>';
  h+='<div class="card" style="border-color:#5BC8FF44"><div class="cl">Apr 2027</div><div class="cv b" style="font-size:1.3rem">'+fmt(C.apr27)+'</div></div>';
  h+='<div class="card" style="border-color:#4FE08044"><div class="cl">$50K Net Worth</div><div class="cv g" style="font-size:1.3rem">'+C.k50+'</div></div>';
  h+='</div>';
  h+='<div class="legend"><span><span class="bk" style="background:#FF9F40"></span>Checking (RBFCU)</span><span><span class="bk" style="background:#FFE020"></span>Savings · SPAXX</span><span><span class="bk" style="background:#4FE080"></span>One connected timeline</span></div>';
  // Tabs
  h+='<div class="phases">';
  TABS.forEach(function(t,ti){if(S.hiddenTabs[ti])return;h+='<div class="ph '+(S.phase===ti?'on':'')+'" onclick="set(\'phase\','+ti+')">'+t.name+'</div>';});
  h+='</div>';

  // ===== LIVE LEDGER (always shows current month, whatever tab it's in) =====
  var liveBal=C.liveBalance;
  var M=S.months[cm];
  var nothingChecked=(liveBal===C.months[cm].startBal-((Number(S.discretionary[cm])||0)));
  h+='<div class="livebox">';
  h+='<div class="livetop"><span class="livelabel">CURRENT BALANCE · '+cmLabel+'</span><span class="liveedit">check off income/bills in the '+cmMeta[0]+' card below</span></div>';
  h+='<div class="livenum">'+fmt(liveBal)+'</div>';
  h+='<div class="livesub">'+(nothingChecked?'starting '+cmMeta[0]+' balance (carried in)':'what you have right now')+'<br>projected '+cmMeta[0]+' end: <span style="color:#FFE020">'+fmt(C.projEnd)+'</span> → flows through every month after</div>';
  h+='<div class="quickrow"><span class="quicklabel">− spend:</span>';
  [10,20,50,100].forEach(function(a){h+='<button class="quickbtn" onclick="addDisc('+cm+','+a+')">−$'+a+'</button>';});
  h+='<span class="iwrap" style="color:#FF8080;margin-left:4px">−$<input class="num" style="width:54px;color:#FF8080;border-bottom-color:#FF505055" type="number" id="customsub" placeholder="0"></span><button class="quickbtn" onclick="var v=document.getElementById(\'customsub\').value;if(v){addDisc('+cm+',Number(v));}">go</button></div>';
  h+='<div class="quickrow"><span class="quicklabel">+ add:</span>';
  [10,20,50,100].forEach(function(a){h+='<button class="quickbtn addbtn2" onclick="addMoney('+cm+','+a+')">+$'+a+'</button>';});
  h+='<span class="iwrap" style="color:#4FE080;margin-left:4px">+$<input class="num" style="width:54px;color:#4FE080;border-bottom-color:#4FE08055" type="number" id="customadd" placeholder="0"></span><button class="quickbtn addbtn2" onclick="var v=document.getElementById(\'customadd\').value;if(v){addMoney('+cm+',Number(v));}">go</button></div>';
  var adj=Number(S.discretionary[cm])||0;
  if(adj!==0){var isSp=adj>0;h+='<div class="quickrow"><span class="quicklabel" style="color:'+(isSp?'#FF8080':'#4FE080')+'">'+(isSp?'net spent this month: '+fmt(adj):'net added this month: '+fmt(-adj))+'</span><button class="quickbtn" style="border-color:#333;color:#888" onclick="setDisc('+cm+',0)">clear</button></div>';}
  // close-out
  var nextLabel=cm<21?MONTHS_META[cm+1][0]+" "+MONTHS_META[cm+1][1]:null;
  if(!pendingClose){
    h+='<div class="closerow"><button class="closebtn" onclick="askClose()">✓ Close out '+cmMeta[0]+' '+(nextLabel?'→ start '+nextLabel:'(final month)')+'</button></div>';
    h+='<div class="closehint">locks '+cmMeta[0]+' at '+fmt(liveBal)+', then '+(nextLabel?nextLabel+' starts with that carried in':'timeline complete')+'</div>';
  }else{
    h+='<div class="closerow" style="display:flex;gap:8px"><button class="closebtn" style="background:#4FE080;color:#080808;flex:1" onclick="closeMonth('+cm+')">✓ YES, close '+cmMeta[0]+' at '+fmt(liveBal)+'</button><button class="closebtn" style="border-color:#555;color:#888;flex:0 0 90px" onclick="cancelClose()">cancel</button></div>';
    h+='<div class="closehint" style="color:#FFE020">confirm: '+cmMeta[0]+' locks at '+fmt(liveBal)+(nextLabel?' → '+nextLabel+' starts there':'')+'</div>';
  }
  // jump within active tab
  var T=TABS[S.phase];
  h+='<div class="quickrow"><span class="quicklabel">jump to month:</span>';
  for(var mi=T.s;mi<=T.e;mi++){var closed=S.closedMonths[mi];
    h+='<button class="quickbtn" style="'+(cm===mi?'background:#4FE08033;border-color:#4FE080;color:#4FE080':(closed?'border-color:#4FE08033;color:#4FE08088':'border-color:#333;color:#666'))+'" onclick="setCurrentMonth('+mi+')">'+(closed?'✓':'')+MONTHS_META[mi][0]+'</button>';}
  h+='</div>';
  h+='</div>';

  // ===== ACTIVE TAB CONTENT =====
  var t=S.phase,TT=TABS[t];
  // carry-in panel
  if(t===0){
    h+='<div class="panel gold"><div class="ptitle">▸ Carry-in from June</div>';
    h+='<div class="row" style="border:none"><span class="lbl">July starting balance</span><span class="iwrap">$<input class="num" type="number" value="'+S.junEnd+'" onchange="set(\'junEnd\',Number(this.value)||0)"></span></div>';
    h+='<div class="row" style="border:none"><span class="lbl">RBFCU checking floor</span><span class="iwrap">$<input class="num" type="number" value="'+S.efTarget+'" onchange="set(\'efTarget\',Number(this.value)||0)"></span></div>';
    h+='<div class="help">Everything above the floor sweeps to Fidelity SPAXX. July floor ramps at $2,000 → then this floor.</div></div>';
    h+='<div class="sec">Extra Income (lands in the month earned)</div><div class="br">';
    h+='<button class="btn '+(S.plasma2?'ong':'')+'" onclick="set(\'plasma2\','+(!S.plasma2)+')">'+(S.plasma2?'✓ ':'')+'Plasma #2 $450 (Oct)</button>';
    h+='<button class="btn '+(S.jewelry?'onb':'')+'" onclick="set(\'jewelry\','+(!S.jewelry)+')">'+(S.jewelry?'✓ ':'')+'Jewelry $500 (Dec)</button></div>';
  }else if(t===1){
    h+='<div class="panel gold"><div class="ptitle">▸ Carry-in from Dec \'26 (live-linked)</div>';
    h+='<div class="row" style="border:none"><span class="lbl">January starts with</span><span class="iwrap g">'+fmt(C.months[5].total)+'</span></div>';
    h+='<div class="help">This is December\'s ending balance — it updates automatically as 2026 changes. Nothing to type.</div></div>';
  }else{
    h+='<div class="panel gold"><div class="ptitle">▸ Carry-in from Apr \'27 (live-linked)</div>';
    h+='<div class="row" style="border:none"><span class="lbl">May \'27 starts with</span><span class="iwrap g">'+fmt(C.months[9].total)+'</span></div>';
    h+='<div class="help">This is April\'s ending balance — updates automatically as earlier months change.</div></div>';
  }

  h+='<div class="sec">Tap a month to open & edit every line · lifestyle (gas+fun) shared across all months</div>';

  // month cards for this tab
  for(var i=TT.s;i<=TT.e;i++){
    var m=C.months[i],MM=S.months[i],open=S.openMonth===i,closed=S.closedMonths[i];
    var meta=MONTHS_META[i];
    h+='<div class="mcard'+(open?' mopen':'')+(closed?' mclosed':'')+'">';
    h+='<div class="mh2" onclick="toggleMonth('+i+')">';
    h+='<div class="mn">'+(closed?'✓ ':'')+meta[0]+' <small>'+meta[1]+'</small>'+(open?' ▾':' ▸')+'</div>';
    h+='<div><div class="mc">In</div><div class="mv g">'+fmt(m.inc)+'</div></div>';
    h+='<div><div class="mc">Bills</div><div class="mv r">'+fmt(m.billSum)+'</div></div>';
    h+='<div><div class="mc">RBFCU</div><div class="mv o">'+fmt(m.ef)+'</div></div>';
    h+='<div style="text-align:right"><div class="mc">Total'+(S.monthOverrides[i]!=null?' 🔒':'')+'</div><div class="mv" style="font-family:\'Bebas Neue\',sans-serif;font-size:0.95rem;color:#4FE080">'+fmt(m.total)+'</div></div>';
    h+='</div>';
    if(open){
      h+='<div class="mbody">';
      h+='<div class="lhead g">INCOME'+(m.extra>0?' <span style="color:#4FE080;font-weight:normal">(+'+fmt(m.extra)+' extra auto-added)</span>':'')+'</div>';
      MM.income.forEach(function(L,li){
        var ck=i===cm?'<button class="ckbox '+(L.done?'ckon':'')+'" onclick="toggleDone('+i+',\'income\','+li+')">'+(L.done?'✓':'')+'</button>':'';
        h+='<div class="lrow'+(L.done?' ldone':'')+'">'+ck+'<input class="lname" value="'+String(L.n).replace(/"/g,"&quot;")+'" onchange="editLineName('+i+',\'income\','+li+',this.value)"><span class="lamt g">$<input class="num" style="color:#4FE080;border-bottom-color:rgba(79,224,128,.3);width:64px" type="number" value="'+L.a+'" onchange="editLine('+i+',\'income\','+li+',this.value)"></span><button class="xbtn" onclick="delLine('+i+',\'income\','+li+')">×</button></div>';
      });
      h+='<div class="addrow"><button class="addbtn" onclick="addLine('+i+',\'income\')">+ add income line</button><span class="lsub g">= '+fmt(m.inc)+'</span></div>';
      h+='<div class="lhead r" style="margin-top:10px">BILLS</div>';
      MM.bills.forEach(function(L,li){
        var ck=i===cm?'<button class="ckbox '+(L.done?'ckon':'')+'" onclick="toggleDone('+i+',\'bills\','+li+')">'+(L.done?'✓':'')+'</button>':'';
        h+='<div class="lrow'+(L.done?' ldone':'')+'">'+ck+'<input class="lname" value="'+String(L.n).replace(/"/g,"&quot;")+'" onchange="editLineName('+i+',\'bills\','+li+',this.value)"><span class="lamt">$<input class="num" style="width:64px" type="number" value="'+L.a+'" onchange="editLine('+i+',\'bills\','+li+',this.value)"></span><button class="xbtn" onclick="delLine('+i+',\'bills\','+li+')">×</button></div>';
      });
      h+='<div class="addrow"><button class="addbtn" onclick="addLine('+i+',\'bills\')">+ add bill line</button><span class="lsub r">= '+fmt(m.billSum)+'</span></div>';
      h+='<div class="lhead" style="margin-top:10px;color:#888">LIFESTYLE (shared across all months)</div>';
      h+='<div class="lrow"><span class="lname" style="padding-left:2px;border:none">Gas</span><span class="lamt">$<input class="num" style="width:64px" type="number" value="'+S.gas+'" onchange="set(\'gas\',Number(this.value)||0)"></span></div>';
      h+='<div class="lrow"><span class="lname" style="padding-left:2px;border:none">Fun</span><span class="lamt">$<input class="num" style="width:64px" type="number" value="'+S.fun+'" onchange="set(\'fun\',Number(this.value)||0)"></span></div>';
      if(m.disc!==0){h+='<div class="lrow"><span class="lname" style="padding-left:2px;border:none;color:'+(m.disc>0?'#FF8080':'#4FE080')+'">'+(m.disc>0?'Logged spending':'Logged additions')+'</span><span class="lamt" style="color:'+(m.disc>0?'#FF8080':'#4FE080')+'">'+(m.disc>0?'−':'+')+fmt(Math.abs(m.disc))+'</span></div>';}
      h+='<div class="msum"><span>'+meta[0]+' '+meta[1]+' net</span><span class="g">'+(m.net>=0?'+':'')+fmt(m.net)+'</span></div>';
      h+='<div class="msum"><span>Calculated → RBFCU '+fmt(m.ef)+' · SPAXX '+fmt(m.cash)+'</span><span style="color:'+(S.monthOverrides[i]!=null?'#666':'#4FE080')+';font-family:\'Bebas Neue\',sans-serif;font-size:1.1rem;'+(S.monthOverrides[i]!=null?'text-decoration:line-through':'')+'">'+fmt(m.total)+'</span></div>';
      h+='<div class="ovbox"><div class="ovlabel">✎ Actual end-of-'+meta[0]+' balance <span style="color:#555">(optional — overrides calc)</span></div><div class="ovrow"><span class="iwrap" style="color:#FFE020;font-size:1.1rem">$<input class="num" style="width:90px;font-size:1.1rem;border-bottom-color:#FFE020" type="number" placeholder="'+m.total+'" value="'+(S.monthOverrides[i]!=null?S.monthOverrides[i]:"")+'" onchange="setOverride('+i+',this.value)"></span>'+(S.monthOverrides[i]!=null?'<button class="ovclear" onclick="setOverride('+i+',\'\')">↺ use calc</button>':'')+'</div></div>';
      if(closed){h+='<div style="margin-top:10px"><button class="ovclear" style="width:100%;padding:8px" onclick="reopenMonth('+i+')">↺ reopen '+meta[0]+' (unlock & make current)</button></div>';}
      h+='</div>';
    }
    h+='</div>';
  }

  // delete tab button
  if(t<2){
    var canDelete=S.currentMonthIdx>TT.e;
    if(canDelete){
      if(pendingHide===t){
        h+='<div style="display:flex;gap:8px;margin-top:14px"><button class="delbtn" style="flex:1;background:#FF5050;color:#fff;border-style:solid" onclick="hideTab('+t+')">✓ YES, remove this tab</button><button class="delbtn" style="flex:0 0 90px;color:#888;border-color:#333" onclick="cancelHide()">cancel</button></div>';
      }else{
        h+='<button class="delbtn" onclick="askHide('+t+')">🗑 Remove '+TT.name.replace(/🟠 |🟣 |🟢 /,'')+' tab (months stay locked in the math)</button>';
      }
    }else{
      h+='<div class="help" style="text-align:center;margin-top:12px">The remove-tab button appears here once every month in this tab is closed out.</div>';
    }
  }

  // reset
  if(pendingReset){
    h+='<div style="display:flex;gap:8px;margin-top:18px"><button class="resetbtn" style="flex:1;color:#FF8080;border-color:#FF5050" onclick="doReset()">✓ YES, wipe everything & reset</button><button class="resetbtn" onclick="cancelReset()">cancel</button></div>';
  }else{
    h+='<button class="resetbtn" onclick="askReset()">↺ Reset to defaults</button>';
  }
  h+='<div class="note">NATHAN WOODARD · NIW SOLUTIONS · ONE CONNECTED TIMELINE · AUTO-SAVE · NOT FINANCIAL ADVICE</div>';
  app.innerHTML=h;
}
render();
</script>
</body></html>
